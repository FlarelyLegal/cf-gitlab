# git-cliff configuration for cf-gitlab
# https://git-cliff.org/docs/configuration
#
# Generates changelog from Conventional Commits.
# Used by: jj push alias, CI release pipeline (git-cliff --latest --strip header)

[changelog]
header = """
# Changelog

All notable changes are documented in this file.
Generated by [git-cliff](https://git-cliff.org/).

"""
body = """
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif -%}
  {% if commit.breaking %}[**breaking**] {% endif -%}
  {{ commit.message | upper_first }}
{% endfor %}
{% endfor -%}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
filter_commits = false
sort_commits = "oldest"

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->Refactor" },
  { message = "^docs", group = "<!-- 3 -->Documentation" },
  { message = "^perf", group = "<!-- 4 -->Performance" },
  { message = "^style", group = "<!-- 5 -->Styling" },
  { message = "^test", group = "<!-- 6 -->Testing" },
  { message = "^chore|^ci", group = "<!-- 7 -->Miscellaneous" },
  { message = "^build", group = "<!-- 8 -->Build" },
  { message = "^revert", group = "<!-- 9 -->Revert" },
  { message = "^Merge", skip = true },
]

tag_pattern = "v[0-9].*"

link_parsers = [
  { pattern = "!([0-9]+)", href = "https://gitlab.flarelylegal.com/flarely-legal/gitlab-self-hosted/-/merge_requests/$1" },
  { pattern = "#([0-9]+)", href = "https://gitlab.flarelylegal.com/flarely-legal/gitlab-self-hosted/-/issues/$1" },
]

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
