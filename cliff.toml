# git-cliff configuration for cf-gitlab
# https://git-cliff.org/docs/configuration
#
# Generates a Keep a Changelog (https://keepachangelog.com/en/1.1.0/) style
# changelog from Conventional Commits (https://www.conventionalcommits.org/).

[changelog]
# Header prepended to the full changelog.
header = """# Changelog

All notable changes to this project will be documented in this file.

Format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
Commit messages follow [Conventional Commits](https://www.conventionalcommits.org/).

"""
# Body template for each release section.
body = """
{%- macro remote_url() -%}
  https://gitlab.flarelylegal.com/flarely-legal/gitlab-self-hosted
{%- endmacro -%}

{% if version -%}
  ## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }} \
      ([{{ commit.id | truncate(length=8, end="") }}]({{ self::remote_url() }}/-/commit/{{ commit.id }})) \
      - {{ commit.author.name }}
  {%- endfor %}
{% endfor %}
"""
# Remove leading/trailing whitespace from the template output.
# (Tera templates produce extra whitespace from control flow blocks.)
trim = true
# Footer appended to the full changelog.
footer = ""
# Postprocessors to clean up the output.
postprocessors = [
  { pattern = '  ', replace = "" },
]

[git]
# Parse commits as Conventional Commits.
conventional_commits = true
# Filter out non-conventional commits.
filter_unconventional = true
# Process each line of a commit as a separate commit.
split_commits = false
# Regex for preprocessing commit messages before parsing.
commit_preprocessors = [
  # Remove trailing whitespace.
  { pattern = '\s+$', replace = "" },
]
# Regex for parsing and grouping commits.
# The first matching rule wins. "group" sets the changelog section header.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  { message = "^refactor", group = "Changed" },
  { message = "^ci", group = "Changed" },
  { message = "^style", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", skip = true },
]
# Protect breaking changes from being skipped by a parser above.
protect_breaking_commits = true
# Filter out commits by their parsed values (not by raw message).
filter_commits = false
# Glob pattern for matching git tags.
tag_pattern = "v[0-9].*"
# Sort commits within each group.
sort_commits = "newest"

[bump]
# Rules for auto-version bumping with --bump.
# feat -> minor, fix -> patch, BREAKING CHANGE -> major
features_always_bump_minor = true
breaking_always_bump_major = true
