# ─── BATS Tests: Caddy ──────────────────────────────────────────────────────
# Unit tests for the entrypoint script and integration tests that build and
# run the custom Caddy Docker container.  Requires bats, bats-assert,
# bats-support installed on the runner (already present at /usr/lib/bats/).
#
# Path-filtered: only runs when relevant files change.
# Always runs on tags as a safety gate before build-caddy.
# ─────────────────────────────────────────────────────────────────────────────

test-caddy-entrypoint:
  stage: test
  script:
    - bats tests/caddy/entrypoint.bats
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - stacks/caddy/entrypoint.sh
        - tests/caddy/entrypoint.bats
        - tests/caddy/test_helper.bash
    - if: $CI_COMMIT_BRANCH
      changes:
        - stacks/caddy/entrypoint.sh
        - tests/caddy/entrypoint.bats
        - tests/caddy/test_helper.bash

test-caddy-container:
  stage: test
  variables:
    CADDY_TEST_IMAGE: caddy-test:bats
    CADDY_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/caddy:buildcache"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx build
      --cache-from "type=registry,ref=$CADDY_CACHE_IMAGE"
      --load
      -t "$CADDY_TEST_IMAGE"
      stacks/caddy
    - CADDY_TEST_IMAGE="$CADDY_TEST_IMAGE" bats tests/caddy/container-smoke.bats
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - stacks/caddy/**
        - tests/caddy/container-smoke.bats
        - tests/caddy/test_helper.bash
    - if: $CI_COMMIT_BRANCH
      changes:
        - stacks/caddy/**
        - tests/caddy/container-smoke.bats
        - tests/caddy/test_helper.bash
