# ─── GitHub Mirror ──────────────────────────────────────────────────────────
# Push main branch and tags to GitHub after successful lint.
# Requires gitlab_self_hosted_mirror CI/CD variable (classic PAT with public_repo scope, masked + protected).
mirror-github:
  stage: deploy
  variables:
    GIT_DEPTH: 0
  script:
    - |
      REMOTE_URL="https://${gitlab_self_hosted_mirror}@github.com/FlarelyLegal/cf-gitlab.git"
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        printf "Pushing tag %s to GitHub...\n" "${CI_COMMIT_TAG}"
        git push --force "${REMOTE_URL}" "refs/tags/${CI_COMMIT_TAG}"
      else
        printf "Pushing %s to GitHub...\n" "${CI_COMMIT_BRANCH}"
        git push --force "${REMOTE_URL}" "HEAD:main"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
