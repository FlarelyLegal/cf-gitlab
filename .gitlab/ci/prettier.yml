# ─── Prettier ───────────────────────────────────────────────────────────────
# Check formatting of Markdown, JSON, TypeScript, and YAML files.
# Fails if any file does not match Prettier code style.
prettier:
  stage: lint
  script:
    - printf "Prettier %s\n" "$(npx prettier --version)"
    - npx prettier --check "**/*.{md,json,ts,yml,yaml}" --ignore-path .gitignore --ignore-path .prettierignore
  rules:
    - changes:
        - "**/*.md"
        - "**/*.json"
        - "**/*.ts"
        - "**/*.yml"
        - "**/*.yaml"
