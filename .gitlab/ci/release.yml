# ─── Release ─────────────────────────────────────────────────────────────────
# Create synchronized releases on GitLab (self-hosted) and GitHub when a
# semver tag (v*) is pushed. Release notes are generated by git-cliff from
# Conventional Commit history.
#
# Requires:
#   - git-cliff installed on the runner (npm install -g git-cliff)
#   - release-cli installed on the runner (/usr/local/bin/release-cli)
#   - gitlab_self_hosted_mirror CI/CD variable (classic PAT with public_repo scope)

# Shared script: generate release notes for the current tag using git-cliff.
# --latest extracts only the notes for the most recent tag.
# --strip header removes the "## [vX.Y.Z] - date" heading (release-cli and
# the GitHub API add their own title).
.extract-changelog: &extract-changelog
  - |
    TAG="${CI_COMMIT_TAG}"
    printf "Generating release notes for %s with git-cliff...\n" "${TAG}"
    git-cliff --latest --strip header > release-notes.md
    if [ ! -s release-notes.md ]; then
      printf "WARNING: git-cliff produced empty notes for %s, using fallback.\n" "${TAG}"
      printf "Release %s" "${TAG}" > release-notes.md
    fi
    printf "Extracted %s bytes of release notes for %s\n" \
      "$(wc -c < release-notes.md | tr -d ' ')" "${TAG}"

# ─── GitLab Release ──────────────────────────────────────────────────────────
# Uses release-cli to create a release on the self-hosted GitLab instance.
release-gitlab:
  stage: release
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  script:
    - *extract-changelog
    - |
      release-cli create \
        --name "${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description release-notes.md
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# ─── GitHub Release ──────────────────────────────────────────────────────────
# Uses curl + jq to create a matching release on GitHub via the REST API.
# Runs after mirror-github has pushed the tag.
release-github:
  stage: release
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  needs:
    - job: mirror-github
      optional: false
  script:
    - *extract-changelog
    - |
      NOTES_JSON=$(jq -Rs '.' release-notes.md)
      RESPONSE=$(curl -sf -X POST \
        -H "Authorization: token ${gitlab_self_hosted_mirror}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/FlarelyLegal/cf-gitlab/releases" \
        -d "{
          \"tag_name\": \"${CI_COMMIT_TAG}\",
          \"name\": \"${CI_COMMIT_TAG}\",
          \"body\": ${NOTES_JSON},
          \"draft\": false,
          \"prerelease\": false
        }")
      RELEASE_URL=$(printf '%s' "${RESPONSE}" | jq -r '.html_url // empty')
      if [ -n "${RELEASE_URL}" ]; then
        printf "GitHub release created: %s\n" "${RELEASE_URL}"
      else
        printf "Failed to create GitHub release. Response:\n%s\n" "${RESPONSE}"
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
