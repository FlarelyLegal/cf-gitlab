# ─── ShellCheck ─────────────────────────────────────────────────────────────
# Lint all shell scripts with shellcheck. Fails on any warning or error.
# Produces a JUnit XML report for the MR test summary widget.
# Requires: shellcheck, shellcheck-to-junit (python3 script) on the runner.
shellcheck:
  stage: lint-fast
  script:
    - printf "ShellCheck %s\n" "$(shellcheck --version | grep '^version:' | cut -d' ' -f2)"
    - |
      SCRIPTS=$(find . -name '*.sh' -o -name 'detect-secrets' \
        -o -name 'enforce-branch-naming' -o -name 'block-file-extensions' \
        -o -name 'enforce-commit-message' | grep -v node_modules | grep -v .git | sort)
      COUNT=0
      FAIL=0
      for f in $SCRIPTS; do
        COUNT=$((COUNT + 1))
        if shellcheck "$f"; then
          printf "  ✓ %s\n" "$f"
        else
          printf "  ✗ %s\n" "$f"
          FAIL=1
        fi
      done

      # Generate JUnit XML report
      shellcheck --format=json $SCRIPTS > shellcheck-raw.json 2>/dev/null || true
      shellcheck-to-junit shellcheck-raw.json $SCRIPTS > shellcheck.xml
      rm -f shellcheck-raw.json

      if [ "$FAIL" -eq 1 ]; then
        printf "\nShellCheck found issues in one or more scripts.\n"
        exit 1
      fi
      printf "\nAll %s scripts passed.\n" "$COUNT"
  artifacts:
    when: always
    reports:
      junit: shellcheck.xml
  rules:
    - changes:
        - "**/*.sh"
        - "optional/*"
