# ─── CI/CD Pipeline ─────────────────────────────────────────────────────────
# Replaces Auto DevOps with checks appropriate for a shell-script repo.
# Runs on the shell executor runner (runner-1).
#
# Secret detection is handled by the detect-secrets pre-receive server hook,
# which blocks pushes containing leaked credentials before they enter the repo.
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - lint

# ─── ShellCheck ─────────────────────────────────────────────────────────────
# Lint all shell scripts with shellcheck. Fails on any warning or error.
shellcheck:
  stage: lint
  script:
    - printf "ShellCheck %s\n" "$(shellcheck --version | grep '^version:' | cut -d' ' -f2)"
    - |
      SCRIPTS=$(find . -name '*.sh' -o -name 'detect-secrets' \
        -o -name 'enforce-branch-naming' -o -name 'block-file-extensions' \
        -o -name 'enforce-commit-message' | grep -v node_modules | grep -v .git | sort)
      COUNT=0
      FAIL=0
      for f in $SCRIPTS; do
        COUNT=$((COUNT + 1))
        if shellcheck "$f"; then
          printf "  ✓ %s\n" "$f"
        else
          printf "  ✗ %s\n" "$f"
          FAIL=1
        fi
      done
      if [ "$FAIL" -eq 1 ]; then
        printf "\nShellCheck found issues in one or more scripts.\n"
        exit 1
      fi
      printf "\nAll %s scripts passed.\n" "$COUNT"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
