# ─── CI/CD Pipeline ─────────────────────────────────────────────────────────
# Replaces Auto DevOps with checks appropriate for a shell-script repo.
# Runs on the shell executor runner (runner-1).
#
# Secret detection is handled by the detect-secrets pre-receive server hook,
# which blocks pushes containing leaked credentials before they enter the repo.
# ─────────────────────────────────────────────────────────────────────────────

# Prevent duplicate pipelines: if a branch push has an open MR, only the MR
# pipeline runs. Direct pushes to branches (including main) still trigger.
# Tag pushes create release pipelines.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  GITHUB_REPO: "FlarelyLegal/cf-gitlab"
  GITLAB_COM_PROJECT_ID: "79915657"

stages:
  - lint-fast
  - lint
  - test
  - build
  - deploy
  - release

include:
  # CI/CD Catalog components (flarely-legal/ci-templates v1.0.0)
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/auto-label@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/mr-description-check@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/shellcheck@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/shfmt@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/printf-check@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/executable-check@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/prettier@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/markdownlint@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/codespell@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/yamllint@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/gitleaks@v1.0.0
  - component: gitlab.flarelylegal.com/flarely-legal/ci-templates/semgrep@v1.0.0
  # Legacy includes (deploy + release not yet migrated to components)
  - project: "flarely-legal/ci-templates"
    ref: main
    file:
      - "/deploy.yml"
      - "/release.yml"
  # Local workflows
  - local: ".gitlab/workflows/test-caddy.yml"
  - local: ".gitlab/workflows/build-caddy.yml"

# ─── Unit Tests ──────────────────────────────────────────────────────────────

cdn:test:
  stage: test
  tags: [linux, x64]
  script:
    - cd gitlab-cdn
    - npm ci --prefer-offline
    - npm run test:ci
  artifacts:
    when: always
    reports:
      junit: junit-cdn.xml
  rules:
    - changes:
        - "gitlab-cdn/**"
